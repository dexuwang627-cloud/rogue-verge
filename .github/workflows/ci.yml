name: Node CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pre-commit
        run: python -m pip install --upgrade pip pre-commit

      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure

      - name: Generate architecture report
        run: bash scripts/generate_arch_report.sh

      - name: Enforce architecture rules
        run: python3 scripts/check_architecture.py --config architecture-rules.json --root .

      - name: Upload architecture artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: architecture-report-${{ github.job }}
          path: architecture-report/
          if-no-files-found: warn

  app:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint (if defined)
        run: |
          node -e "const p=require('./package.json'); process.exit(p.scripts&&p.scripts.lint?0:1)" && npm run lint || echo 'skip lint'

      - name: Test (if defined)
        run: |
          node -e "const p=require('./package.json'); process.exit(p.scripts&&p.scripts.test?0:1)" && npm test || echo 'skip test'

      - name: Build (if defined)
        run: |
          node -e "const p=require('./package.json'); process.exit(p.scripts&&p.scripts.build?0:1)" && npm run build || echo 'skip build'
